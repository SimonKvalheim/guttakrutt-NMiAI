<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grocery Bot Replay Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  height: 100vh;
  overflow: hidden;
}

#drop-overlay {
  position: fixed; inset: 0;
  background: rgba(100, 200, 255, 0.15);
  border: 3px dashed #64c8ff;
  z-index: 100;
  display: none;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  color: #64c8ff;
  pointer-events: none;
}

#landing {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  gap: 20px;
}

#landing h1 { font-size: 28px; color: #64c8ff; }
#landing p { color: #888; font-size: 14px; }

#landing .drop-zone {
  width: 400px;
  height: 120px;
  border: 2px dashed #444;
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  cursor: pointer;
  transition: border-color 0.2s;
}

#landing .drop-zone:hover { border-color: #64c8ff; }
#landing .drop-zone span { font-size: 16px; color: #aaa; }

#landing button {
  padding: 10px 24px;
  background: #64c8ff;
  color: #1a1a2e;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
}

/* Replay list */
#replay-list-section {
  width: 500px;
  max-height: 50vh;
  display: none;
}

#replay-list-section h2 {
  font-size: 16px;
  color: #64c8ff;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

#replay-list-section h2 .refresh-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #51cf66;
  display: inline-block;
  margin-left: 8px;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

#replay-list {
  overflow-y: auto;
  max-height: calc(50vh - 40px);
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.replay-entry {
  background: #16213e;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.replay-entry:hover {
  border-color: #64c8ff;
  background: #1a2844;
}

.replay-entry .replay-info {
  display: flex;
  flex-direction: column;
  gap: 2px;
}

.replay-entry .replay-name {
  font-size: 13px;
  font-weight: 600;
  color: #e0e0e0;
}

.replay-entry .replay-meta {
  font-size: 11px;
  color: #888;
}

.replay-entry .replay-score {
  font-size: 18px;
  font-weight: 700;
  color: #ffd43b;
}

.replay-entry .replay-score .score-label {
  font-size: 10px;
  font-weight: 400;
  color: #888;
  display: block;
  text-align: right;
}

#viewer {
  display: none;
  height: 100vh;
  grid-template-columns: 1fr 320px;
  grid-template-rows: 1fr auto;
}

/* Canvas area */
#canvas-wrap {
  position: relative;
  overflow: hidden;
  background: #16213e;
}

canvas {
  display: block;
  width: 100%;
  height: 100%;
}

/* Sidebar */
#sidebar {
  background: #16213e;
  border-left: 1px solid #333;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.panel {
  background: #1a1a2e;
  border: 1px solid #333;
  border-radius: 8px;
  padding: 12px;
}

.panel h3 {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: #64c8ff;
  margin-bottom: 8px;
}

.panel .value {
  font-size: 22px;
  font-weight: 700;
  color: #fff;
}

.panel .sub { font-size: 12px; color: #888; margin-top: 2px; }

.order-items {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-top: 6px;
}

.order-item {
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 600;
}

.order-item.needed { background: #333; color: #ccc; }
.order-item.delivered { background: #2d5a27; color: #7ddb72; }

.bot-card {
  padding: 8px;
  border-radius: 6px;
  margin-top: 6px;
  font-size: 12px;
}

.bot-card .bot-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 4px;
}

.bot-card .bot-dot {
  width: 12px;
  height: 12px;
  border-radius: 50%;
  display: inline-block;
}

.bot-card .bot-name { font-weight: 700; }
.bot-card .bot-detail { color: #aaa; margin-left: 20px; }

.action-line {
  font-size: 12px;
  padding: 2px 0;
  color: #ccc;
}

.action-line .act-label {
  font-weight: 600;
  color: #64c8ff;
}

/* Controls bar */
#controls {
  grid-column: 1 / -1;
  background: #16213e;
  border-top: 1px solid #333;
  padding: 12px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
}

#controls button {
  background: #333;
  border: none;
  color: #e0e0e0;
  width: 36px;
  height: 36px;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}

#controls button:hover { background: #444; }

#round-slider {
  flex: 1;
  accent-color: #64c8ff;
}

#round-label {
  font-size: 14px;
  font-variant-numeric: tabular-nums;
  min-width: 100px;
  text-align: center;
}

#speed-label {
  font-size: 12px;
  color: #888;
  min-width: 40px;
  text-align: center;
}

#speed-slider {
  width: 80px;
  accent-color: #64c8ff;
}

input[type="file"] { display: none; }

/* Replay selector in controls */
#replay-select {
  background: #333;
  color: #e0e0e0;
  border: 1px solid #444;
  border-radius: 6px;
  padding: 4px 8px;
  font-size: 12px;
  max-width: 200px;
  cursor: pointer;
}

#replay-select:hover { border-color: #64c8ff; }
</style>
</head>
<body>

<div id="drop-overlay">Drop replay JSON here</div>

<div id="landing">
  <h1>Grocery Bot Replay Viewer</h1>
  <div id="replay-list-section">
    <h2>Replays <span class="refresh-dot"></span></h2>
    <div id="replay-list"></div>
  </div>
  <div class="drop-zone" id="drop-zone">
    <span>Drop replay .json here</span>
    <button id="btn-browse">Browse file</button>
  </div>
  <p>Space = play/pause &middot; Arrow keys = step &middot; +/- = speed</p>
</div>

<div id="viewer">
  <div id="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <div id="sidebar">
    <div class="panel" id="p-score">
      <h3>Score</h3>
      <div class="value" id="score-val">0</div>
      <div class="sub" id="score-sub"></div>
    </div>

    <div class="panel" id="p-order-active">
      <h3>Active Order</h3>
      <div id="order-active-body"><span class="sub">None</span></div>
    </div>

    <div class="panel" id="p-order-preview">
      <h3>Preview Order</h3>
      <div id="order-preview-body"><span class="sub">None</span></div>
    </div>

    <div class="panel" id="p-bots">
      <h3>Bots</h3>
      <div id="bots-body"></div>
    </div>

    <div class="panel" id="p-actions">
      <h3>Actions This Round</h3>
      <div id="actions-body"></div>
    </div>
  </div>

  <div id="controls">
    <button id="btn-back" title="Step back">&laquo;</button>
    <button id="btn-play" title="Play/Pause">&#9654;</button>
    <button id="btn-fwd" title="Step forward">&raquo;</button>
    <input type="range" id="round-slider" min="0" max="0" value="0">
    <span id="round-label">0 / 0</span>
    <input type="range" id="speed-slider" min="1" max="20" value="4">
    <span id="speed-label">2x</span>
    <select id="replay-select" title="Switch replay" style="display:none"></select>
    <button id="btn-load" title="Load another file">&#128194;</button>
  </div>
</div>

<input type="file" id="file-input" accept=".json">

<script>
const BOT_COLORS = [
  '#ff6b6b', '#51cf66', '#339af0', '#ffd43b', '#cc5de8',
  '#ff922b', '#20c997', '#f06595', '#a9e34b', '#74c0fc',
];

const ITEM_COLORS = {};
let itemColorIdx = 0;
const ITEM_PALETTE = [
  '#e07070', '#5cb85c', '#5bc0de', '#f0ad4e', '#d9534f',
  '#9b59b6', '#1abc9c', '#e67e22', '#3498db', '#e74c3c',
  '#2ecc71', '#f39c12', '#8e44ad', '#16a085', '#c0392b',
  '#27ae60',
];

function getItemColor(type) {
  if (!ITEM_COLORS[type]) {
    ITEM_COLORS[type] = ITEM_PALETTE[itemColorIdx % ITEM_PALETTE.length];
    itemColorIdx++;
  }
  return ITEM_COLORS[type];
}

let replay = null;
let currentFrame = 0;
let playing = false;
let playInterval = null;
let speedMultiplier = 2;

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// --- File loading ---

function loadReplay(data) {
  replay = data;
  currentFrame = 0;
  playing = false;
  clearInterval(playInterval);

  // Reset item colors
  Object.keys(ITEM_COLORS).forEach(k => delete ITEM_COLORS[k]);
  itemColorIdx = 0;

  const maxFrame = replay.frames.length - 1;
  document.getElementById('round-slider').max = maxFrame;
  document.getElementById('round-slider').value = 0;

  document.getElementById('landing').style.display = 'none';
  document.getElementById('viewer').style.display = 'grid';

  resizeCanvas();
  render();
  updateSidebar();
}

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      loadReplay(data);
    } catch (err) {
      alert('Invalid replay JSON: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// File input
document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});
document.getElementById('btn-browse').addEventListener('click', () => {
  document.getElementById('file-input').click();
});
document.getElementById('btn-load').addEventListener('click', () => {
  document.getElementById('file-input').click();
});

// Drag and drop (full window)
document.addEventListener('dragover', e => {
  e.preventDefault();
  document.getElementById('drop-overlay').style.display = 'flex';
});
document.addEventListener('dragleave', e => {
  if (e.relatedTarget === null) {
    document.getElementById('drop-overlay').style.display = 'none';
  }
});
document.addEventListener('drop', e => {
  e.preventDefault();
  document.getElementById('drop-overlay').style.display = 'none';
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});

// --- Canvas rendering ---

function resizeCanvas() {
  const wrap = document.getElementById('canvas-wrap');
  canvas.width = wrap.clientWidth * devicePixelRatio;
  canvas.height = wrap.clientHeight * devicePixelRatio;
  ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
}

window.addEventListener('resize', () => {
  if (replay) { resizeCanvas(); render(); }
});

function render() {
  if (!replay || !replay.frames.length) return;

  const frame = replay.frames[currentFrame];
  const state = frame.state;
  const grid = state.grid;
  const w = grid.width;
  const h = grid.height;

  const cw = canvas.width / devicePixelRatio;
  const ch = canvas.height / devicePixelRatio;

  const padding = 10;
  const cellSize = Math.min((cw - padding * 2) / w, (ch - padding * 2) / h);
  const ox = (cw - cellSize * w) / 2;
  const oy = (ch - cellSize * h) / 2;

  ctx.clearRect(0, 0, cw, ch);

  const walls = new Set(grid.walls.map(p => p[0] + ',' + p[1]));

  // Determine which walls are shelves (have items on them)
  const itemPositions = new Set(state.items.map(item => item.position[0] + ',' + item.position[1]));
  const dropOff = state.drop_off;
  const dropKey = dropOff[0] + ',' + dropOff[1];

  // Draw floor
  for (let y = 0; y < h; y++) {
    for (let x = 0; x < w; x++) {
      const key = x + ',' + y;
      const cx = ox + x * cellSize;
      const cy = oy + y * cellSize;

      if (key === dropKey) {
        ctx.fillStyle = '#2d3a1f';
        ctx.fillRect(cx, cy, cellSize, cellSize);
        // Drop-off label
        ctx.fillStyle = '#7ddb72';
        ctx.font = `bold ${Math.max(10, cellSize * 0.35)}px sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('DROP', cx + cellSize / 2, cy + cellSize / 2);
      } else if (walls.has(key)) {
        if (itemPositions.has(key)) {
          // Shelf with item
          ctx.fillStyle = '#2a2a4a';
        } else {
          // Wall / empty shelf
          ctx.fillStyle = '#2a2a3a';
        }
        ctx.fillRect(cx, cy, cellSize, cellSize);
      } else {
        // Floor
        ctx.fillStyle = '#0f1a2e';
        ctx.fillRect(cx, cy, cellSize, cellSize);
      }

      // Grid line
      ctx.strokeStyle = '#1a2540';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(cx, cy, cellSize, cellSize);
    }
  }

  // Draw items on shelves
  const fontSize = Math.max(8, cellSize * 0.3);
  for (const item of state.items) {
    const ix = item.position[0];
    const iy = item.position[1];
    const cx = ox + ix * cellSize;
    const cy = oy + iy * cellSize;
    const color = getItemColor(item.type);

    // Item dot
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(cx + cellSize / 2, cy + cellSize / 2, cellSize * 0.2, 0, Math.PI * 2);
    ctx.fill();

    // Label
    ctx.fillStyle = '#ddd';
    ctx.font = `bold ${fontSize}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const label = item.type.length > 4 ? item.type.slice(0, 4) : item.type;
    ctx.fillText(label, cx + cellSize / 2, cy + cellSize / 2);
  }

  // Draw bots
  for (const bot of state.bots) {
    const bx = bot.position[0];
    const by = bot.position[1];
    const cx = ox + bx * cellSize + cellSize / 2;
    const cy = oy + by * cellSize + cellSize / 2;
    const color = BOT_COLORS[bot.id % BOT_COLORS.length];
    const radius = cellSize * 0.38;

    // Bot circle
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();

    // Bot border
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Bot ID
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${Math.max(10, cellSize * 0.35)}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(bot.id, cx, cy);

    // Inventory count badge
    if (bot.inventory.length > 0) {
      const badgeR = cellSize * 0.15;
      const badgeX = cx + radius * 0.7;
      const badgeY = cy - radius * 0.7;
      ctx.fillStyle = '#ffd43b';
      ctx.beginPath();
      ctx.arc(badgeX, badgeY, badgeR, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1a1a2e';
      ctx.font = `bold ${Math.max(8, cellSize * 0.22)}px sans-serif`;
      ctx.fillText(bot.inventory.length, badgeX, badgeY);
    }
  }
}

// --- Sidebar ---

function updateSidebar() {
  if (!replay || !replay.frames.length) return;

  const frame = replay.frames[currentFrame];
  const state = frame.state;
  const actions = frame.actions;

  // Score
  document.getElementById('score-val').textContent = state.score;
  document.getElementById('score-sub').textContent =
    `Round ${state.round} / ${state.max_rounds}`;

  // Orders
  renderOrder('order-active-body', state.orders, 'active');
  renderOrder('order-preview-body', state.orders, 'preview');

  // Bots
  const botsBody = document.getElementById('bots-body');
  botsBody.innerHTML = '';
  for (const bot of state.bots) {
    const color = BOT_COLORS[bot.id % BOT_COLORS.length];
    const inv = bot.inventory.length > 0
      ? bot.inventory.join(', ')
      : 'empty';
    const card = document.createElement('div');
    card.className = 'bot-card';
    card.style.background = color + '15';
    card.style.border = `1px solid ${color}40`;
    card.innerHTML = `
      <div class="bot-header">
        <span class="bot-dot" style="background:${color}"></span>
        <span class="bot-name">Bot ${bot.id}</span>
        <span style="color:#888;font-size:11px">(${bot.position[0]}, ${bot.position[1]})</span>
      </div>
      <div class="bot-detail">Inventory: ${inv}</div>
    `;
    botsBody.appendChild(card);
  }

  // Actions
  const actionsBody = document.getElementById('actions-body');
  actionsBody.innerHTML = '';
  if (actions) {
    for (const act of actions) {
      const color = BOT_COLORS[act.bot % BOT_COLORS.length];
      const line = document.createElement('div');
      line.className = 'action-line';
      let detail = act.action;
      if (act.item_id !== undefined) detail += ` (item ${act.item_id})`;
      line.innerHTML = `<span class="act-label" style="color:${color}">Bot ${act.bot}:</span> ${detail}`;
      actionsBody.appendChild(line);
    }
  } else {
    actionsBody.innerHTML = '<span class="sub">Initial state — no actions yet</span>';
  }

  // Round slider
  document.getElementById('round-slider').value = currentFrame;
  document.getElementById('round-label').textContent =
    `${currentFrame} / ${replay.frames.length - 1}`;
}

function renderOrder(containerId, orders, status) {
  const container = document.getElementById(containerId);
  const order = orders.find(o => o.status === status);
  if (!order) {
    container.innerHTML = '<span class="sub">None</span>';
    return;
  }

  const delivered = new Set();
  const deliveredCounts = {};
  for (const d of order.items_delivered) {
    deliveredCounts[d] = (deliveredCounts[d] || 0) + 1;
  }

  // Track which required items are delivered
  const usedCounts = {};
  let html = '<div class="order-items">';
  for (const item of order.items_required) {
    usedCounts[item] = (usedCounts[item] || 0) + 1;
    const isDelivered = usedCounts[item] <= (deliveredCounts[item] || 0);
    const cls = isDelivered ? 'delivered' : 'needed';
    const color = getItemColor(item);
    const bg = isDelivered ? '#2d5a27' : color + '30';
    const fg = isDelivered ? '#7ddb72' : color;
    html += `<span class="order-item" style="background:${bg};color:${fg}">${item}</span>`;
  }
  html += '</div>';
  container.innerHTML = html;
}

// --- Playback controls ---

function stepTo(frame) {
  currentFrame = Math.max(0, Math.min(replay.frames.length - 1, frame));
  render();
  updateSidebar();
}

function togglePlay() {
  playing = !playing;
  document.getElementById('btn-play').innerHTML = playing ? '&#9646;&#9646;' : '&#9654;';
  if (playing) {
    startPlayback();
  } else {
    clearInterval(playInterval);
  }
}

function startPlayback() {
  clearInterval(playInterval);
  const ms = Math.max(20, 500 / speedMultiplier);
  playInterval = setInterval(() => {
    if (currentFrame >= replay.frames.length - 1) {
      playing = false;
      document.getElementById('btn-play').innerHTML = '&#9654;';
      clearInterval(playInterval);
      return;
    }
    stepTo(currentFrame + 1);
  }, ms);
}

function updateSpeed(val) {
  // Slider range 1-20 maps to 0.5x-10x
  speedMultiplier = val / 2;
  document.getElementById('speed-label').textContent =
    speedMultiplier % 1 === 0 ? speedMultiplier + 'x' : speedMultiplier.toFixed(1) + 'x';
  if (playing) startPlayback();
}

// Control buttons
document.getElementById('btn-play').addEventListener('click', togglePlay);
document.getElementById('btn-back').addEventListener('click', () => stepTo(currentFrame - 1));
document.getElementById('btn-fwd').addEventListener('click', () => stepTo(currentFrame + 1));
document.getElementById('round-slider').addEventListener('input', e => {
  stepTo(parseInt(e.target.value));
});
document.getElementById('speed-slider').addEventListener('input', e => {
  updateSpeed(parseInt(e.target.value));
});

// --- Server replay list ---

let serverAvailable = false;
let replayList = [];
let currentReplayFilename = null;

async function checkServer() {
  try {
    const res = await fetch('/api/replays');
    if (!res.ok) return;
    serverAvailable = true;
    const data = await res.json();
    replayList = data;
    renderReplayList();
    updateReplaySelect();
  } catch {
    // Not served from serve.py — file:// mode, hide server features
  }
}

function renderReplayList() {
  const section = document.getElementById('replay-list-section');
  const list = document.getElementById('replay-list');
  if (!replayList.length) {
    section.style.display = 'block';
    list.innerHTML = '<div style="color:#666;font-size:13px;padding:12px;text-align:center">No replays yet. Run a game to generate one.</div>';
    return;
  }

  section.style.display = 'block';
  list.innerHTML = '';
  for (const r of replayList) {
    const entry = document.createElement('div');
    entry.className = 'replay-entry';
    const diff = r.metadata?.difficulty || 'unknown';
    const time = r.metadata?.timestamp
      ? new Date(r.metadata.timestamp).toLocaleString()
      : r.filename;
    const score = r.result?.score ?? '?';
    const rounds = r.result?.rounds_used ?? '?';
    const orders = r.result?.orders_completed ?? '?';
    entry.innerHTML = `
      <div class="replay-info">
        <span class="replay-name">${diff.charAt(0).toUpperCase() + diff.slice(1)} — ${r.frame_count} frames</span>
        <span class="replay-meta">${time} &middot; ${rounds} rounds &middot; ${orders} orders</span>
      </div>
      <div class="replay-score">${score}<span class="score-label">score</span></div>
    `;
    entry.addEventListener('click', () => loadFromServer(r.filename));
    list.appendChild(entry);
  }
}

function updateReplaySelect() {
  const select = document.getElementById('replay-select');
  if (!serverAvailable || !replayList.length) {
    select.style.display = 'none';
    return;
  }
  select.style.display = '';
  select.innerHTML = '';
  for (const r of replayList) {
    const opt = document.createElement('option');
    opt.value = r.filename;
    const diff = r.metadata?.difficulty || '?';
    const score = r.result?.score ?? '?';
    opt.textContent = `${diff} — score ${score} (${r.filename})`;
    if (r.filename === currentReplayFilename) opt.selected = true;
    select.appendChild(opt);
  }
}

async function loadFromServer(filename) {
  try {
    const res = await fetch(`/api/replays/${filename}`);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    currentReplayFilename = filename;
    loadReplay(data);
    updateReplaySelect();
  } catch (err) {
    alert('Failed to load replay: ' + err.message);
  }
}

document.getElementById('replay-select').addEventListener('change', e => {
  if (e.target.value) loadFromServer(e.target.value);
});

// Poll for new replays every 5s when server is available
checkServer();
setInterval(() => {
  if (serverAvailable) checkServer();
}, 5000);

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (!replay) return;
  switch (e.code) {
    case 'Space':
      e.preventDefault();
      togglePlay();
      break;
    case 'ArrowLeft':
      e.preventDefault();
      stepTo(currentFrame - 1);
      break;
    case 'ArrowRight':
      e.preventDefault();
      stepTo(currentFrame + 1);
      break;
    case 'Equal':
    case 'NumpadAdd':
      e.preventDefault();
      const upSlider = document.getElementById('speed-slider');
      upSlider.value = Math.min(20, parseInt(upSlider.value) + 1);
      updateSpeed(parseInt(upSlider.value));
      break;
    case 'Minus':
    case 'NumpadSubtract':
      e.preventDefault();
      const downSlider = document.getElementById('speed-slider');
      downSlider.value = Math.max(1, parseInt(downSlider.value) - 1);
      updateSpeed(parseInt(downSlider.value));
      break;
  }
});
</script>
</body>
</html>
